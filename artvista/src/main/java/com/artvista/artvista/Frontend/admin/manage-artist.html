<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin - Manage Artists</title>
    <link rel="stylesheet" href="../css/admin.css">
</head>
<body>

<!-- Top Navbar -->
<nav class="admin-navbar">
    <div class="logo">ArtVista</div>
    <div class="admin-title">ADMIN IN</div>
</nav>

<div class="admin-container">

    <!-- Sidebar -->
    <aside class="sidebar">

        <div class="profile">
            <img src="../assets/images/artist.jpg">
            <span>User name</span>
        </div>

        <ul class="menu">
            <li>Dashboard</li>
            <li>Manage Event</li>
            <li>Manage Paintings</li>
            <li>Manage User</li>
            <li class="active">Manage Artist</li>
        </ul>

    </aside>

    <!-- Main Content -->
    <main class="manage-content">

        <h1>Artist Management</h1>

        <div class="top-section">
            <img src="../assets/images/painting1.jpg" class="top-image">

            <div class="search-box">
                <input type="text" placeholder="Value">
                <button>🔍</button>
            </div>
        </div>

        <div class="table-box">

            <div class="table-header">
                <span>Artists</span>
                <span>Details</span>
            </div>

            <!-- Artist Row -->
            <div class="user-row">
                <div class="user-info">
                    <div class="avatar"></div>
                    <div>
                        <h3>Artist Name1</h3>
                    </div>
                </div>

                <span>&lt;Artist Details&gt;</span>

                <div class="action-buttons">
                    <button class="edit-btn">Edit</button>
                    <button class="delete-btn">🗑</button>
                </div>
            </div>

            <div class="user-row">
                <div class="user-info">
                    <div class="avatar"></div>
                    <div>
                        <h3>Artist Name2</h3>
                    </div>
                </div>

                <span>&lt;Artist Details&gt;</span>

                <div class="action-buttons">
                    <button class="edit-btn">Edit</button>
                    <button class="delete-btn">🗑</button>
                </div>
            </div>

            <div class="user-row">
                <div class="user-info">
                    <div class="avatar"></div>
                    <div>
                        <h3>Artist Name3</h3>
                    </div>
                </div>

                <span>&lt;Artist Details&gt;</span>

                <div class="action-buttons">
                    <button class="edit-btn">Edit</button>
                    <button class="delete-btn">🗑</button>
                </div>
            </div>

            <div class="user-row">
                <div class="user-info">
                    <div class="avatar"></div>
                    <div>
                        <h3>Artist Name4</h3>
                    </div>
                </div>

                <span>&lt;Artist Details&gt;</span>

                <div class="action-buttons">
                    <button class="edit-btn">Edit</button>
                    <button class="delete-btn">🗑</button>
                </div>
            </div>

            <!-- Pagination -->
            <div class="pagination">
                <button>&lt;</button>
                <button class="active">1</button>
                <button>2</button>
                <button>3</button>
                <button>4</button>
                <button>&gt;</button>
            </div>

        </div>

    </main>

</div>

</body>
</html>
