<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login - ArtVista</title>
    <link rel="stylesheet" href="css/login.css">
</head>
<body>

<div class="container">

    <!-- LEFT IMAGE -->
    <div class="left">
        <img src="assets/images/login-art.jpg" alt="Art Image">
    </div>

    <!-- RIGHT SIDE -->
    <div class="right">

        <div class="form-box">
            <h1>Sign in to</h1>
            <h2>ArtVista</h2>

            <form>
                <input type="text" placeholder="Enter email or user name" required>

                <div class="password-field">
                    <input type="password" placeholder="Password" required>
                    <span>👁</span>
                </div>

                <div class="forgot">
                    <a href="#">Forgot password?</a>
                </div>

                <button type="submit" class="btn">Login</button>

                <p class="or">or continue with</p>

                <div class="social">
                    <img src="assets/icons/facebook.png">
                    <img src="assets/icons/apple.png">
                    <img src="assets/icons/google.png">
                </div>

                <p class="register">
                    If you don’t have an account register <br>
                    You can <a href="signup.html">Register here !</a>
                </p>

            </form>
        </div>

    </div>

</div>

</body>
</html>
