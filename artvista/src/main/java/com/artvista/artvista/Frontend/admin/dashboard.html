<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard - ArtVista</title>
    <link rel="stylesheet" href="../css/admin.css">
</head>
<body>

<!-- Top Navbar -->
<nav class="admin-navbar">
    <div class="logo">ArtVista</div>
    <div class="admin-title">ADMIN IN</div>
</nav>

<!-- Main Layout -->
<div class="admin-container">

    <!-- Sidebar -->
    <aside class="sidebar">

        <div class="profile">
            <img src="../assets/images/artist.jpg" alt="Admin">
            <span>User name</span>
        </div>

        <ul class="menu">
            <li class="active">Dashboard</li>
            <li>Manage Event</li>
            <li>Manage Paintings</li>
            <li>Manage User</li>
            <li>Manage Artist</li>
        </ul>

    </aside>

    <!-- Dashboard Content -->
    <main class="dashboard-content">

        <h1>Admin Dashboard</h1>

        <div class="cards">

            <div class="card pink">
                <h2>25</h2>
                <p>Total Users</p>
            </div>

            <div class="card pink">
                <h2>120</h2>
                <p>Total Paintings</p>
            </div>

            <div class="card purple">
                <h2>85</h2>
                <p>Total Events</p>
            </div>

            <div class="card purple">
                <h2>$50/mo</h2>
                <p>Total Sale 25,999</p>
            </div>

        </div>

    </main>

</div>

</body>
</html>
