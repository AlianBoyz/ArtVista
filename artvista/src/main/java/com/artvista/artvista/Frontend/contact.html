<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Contact - ArtVista</title>
    <link rel="stylesheet" href="css/contact.css">
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar">
    <div class="logo">ArtVista</div>

    <ul class="nav-links">
        <li><a href="home.html">Home</a></li>
        <li><a href="events.html">Event</a></li>
        <li><a href="shop.html">Shop</a></li>
        <li><a href="about.html">About</a></li>
        <li><a class="active">Contact</a></li>
    </ul>

    <img src="assets/icons/user.png" class="profile">
</nav>


<!-- MAIN -->
<section class="contact-container">

    <!-- LEFT IMAGE -->
    <div class="left">
        <img src="assets/images/contact-art.jpg" alt="Art Image">
    </div>

    <!-- RIGHT FORM -->
    <div class="right">

        <div class="form-box">

            <h1>Contact to</h1>
            <h2>ArtVista</h2>

            <form>

                <input type="text" placeholder="Name" required>

                <input type="email" placeholder="Email ID" required>

                <textarea placeholder="Comment your query" required></textarea>

                <button type="submit" class="btn">Register</button>

            </form>

        </div>

    </div>

</section>

</body>
</html>
