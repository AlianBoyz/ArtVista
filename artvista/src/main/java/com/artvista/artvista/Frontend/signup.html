<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sign Up - ArtVista</title>
    <link rel="stylesheet" href="css/signup.css">
</head>
<body>

<div class="container">

    <!-- LEFT IMAGE -->
    <div class="left">
        <img src="assets/images/signup-art.jpg" alt="Art Image">
    </div>

    <!-- RIGHT FORM -->
    <div class="right">

        <div class="form-box">

            <h1>Sign Up to</h1>
            <h2>ArtVista</h2>

            <form>

                <input type="text" placeholder="Name" required>

                <input type="email" placeholder="Email ID" required>

                <input type="text" placeholder="Role (user/admin)" required>

                <div class="password-field">
                    <input type="password" placeholder="Password" required>
                    <span>👁</span>
                </div>

                <div class="password-field">
                    <input type="password" placeholder="Confirm Password" required>
                    <span>👁</span>
                </div>

                <button type="submit" class="btn">Register</button>

                <p class="or">or continue with</p>

                <div class="social">
                    <img src="assets/icons/facebook.png">
                    <img src="assets/icons/apple.png">
                    <img src="assets/icons/google.png">
                </div>

                <p class="login-text">
                    If you already have an account <br>
                    You can <a href="login.html">Login here !</a>
                </p>

            </form>

        </div>

    </div>

</div>

</body>
</html>
